# fly.toml — Discord AI-news bot (worker-only, no HTTP)
app = "ai-news-discord-bot"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[processes]
  app = "python bot.py"

[[mounts]]
  source = "botstate"
  destination = "/data"
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  processes = ["app"]
