# fly.toml — Discord AI-news bot (worker-only, no HTTP)
app = "ai-news-discord-bot"
primary_region = "fra"

[experimental]
  auto_rollback = true

[build]
  dockerfile = "Dockerfile"

[env]
  STATE_DB_PATH = "/data/state.db"
  FEED_CACHE_FILE = "/data/.feed_cache.json"

[processes]
  app = "python bot.py"

[[mounts]]
  source = "botstate"
  destination = "/data"
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["app"]
